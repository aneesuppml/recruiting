# Recruiting AI — backend (Rails), frontend (Vite), PostgreSQL.
# Usage: copy .env.example to .env, then: docker compose up --build
#
# URLs: frontend http://localhost:5173 | API http://localhost:3000
# Inside the Compose network the frontend dev server proxies /api → http://backend:3000.
# If host ports 3000, 5173, or 5432 are already in use, change the left side of the port mappings below.

name: recruiting-ai

services:
  db:
    container_name: recruiting-ai-db
    image: postgres:16-alpine
    networks:
      - recruiting-ai
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-recruiting_ai_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: recruiting-ai-backend
    image: recruiting-ai-backend:dev
    build:
      context: ./recruiting-ai-backend
      dockerfile: Dockerfile
    networks:
      - recruiting-ai
    volumes:
      - ./recruiting-ai-backend:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      RAILS_ENV: development
      DOCKER: "true"
      DATABASE_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-recruiting_ai_development}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-development_secret_key_base_change_me_min_32_characters_long}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: recruiting-ai-frontend
    image: recruiting-ai-frontend:dev
    build:
      context: ./recruiting-ai-frontend
      dockerfile: Dockerfile
    networks:
      - recruiting-ai
    volumes:
      - ./recruiting-ai-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_DOCKER: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5173/api}
      VITE_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

networks:
  recruiting-ai:
    name: recruiting-ai-network

volumes:
  postgres_data:
    name: recruiting-ai-postgres-data
  bundle_cache:
    name: recruiting-ai-bundle-cache
  frontend_node_modules:
    name: recruiting-ai-frontend-node-modules
