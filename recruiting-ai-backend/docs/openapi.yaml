      summary: Candidate-scoped job board (scoped by candidate company_id when available)
      operationId: candidateJobsIndex
      security:
        - CandidateJWT: []
      parameters:
        - name: title
          in: query
          required: false
          schema: { type: string }
        - name: location
          in: query
          required: false
          schema: { type: string }
        - name: skills
          in: query
          required: false
          schema: { type: string, description: "Single skill string to match against required_skills array" }
        - name: experience_level
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Candidate job summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSummary"
        "401":
          $ref: "#/components/responses/Unauthorized401"

  /candidate/jobs/{id}:
    get:
      tags: [Candidate]
      summary: Candidate-scoped job details
      operationId: candidateJobsShow
      security:
        - CandidateJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Candidate job details including company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "404":
          $ref: "#/components/responses/NotFound404"

  /candidate/dashboard:
    get:
      tags: [Candidate]
      summary: Candidate applications (candidate dashboard)
      operationId: candidateDashboard
      security:
        - CandidateJWT: []
      responses:
        "200":
          description: Candidate applications array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateApplication"
        "401":
          $ref: "#/components/responses/Unauthorized401"

  /candidate/applications:
    post:
      tags: [Candidate]
      summary: Apply to a job (creates application)
      operationId: candidateApply
      security:
        - CandidateJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateApplicationRequest"
      responses:
        "201":
          description: Created candidate application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateApplication"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /candidate/applications/{id}:
    get:
      tags: [Candidate]
      summary: Get a single candidate application (includes scheduled interview when present)
      operationId: candidateApplicationShow
      security:
        - CandidateJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Candidate application (optionally with interview)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateApplication"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "404":
          $ref: "#/components/responses/NotFound404"

  /super-admin/companies:
    get:
      tags: [SuperAdmin]
      summary: Super Admin list companies (all tenants)
      operationId: superAdminListCompanies
      security:
        - RecruiterJWT: []
      responses:
        "200":
          description: Company objects merged with admin_user
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Company"
                    - type: object
                      properties:
                        admin_user:
                          type: object
                          nullable: true
                          properties:
                            name:
                              type: string
                              nullable: true
                            email:
                              type: string
                              format: email
                              nullable: true
    post:
      tags: [SuperAdmin]
      summary: Super Admin create company
      operationId: superAdminCreateCompany
      security:
        - RecruiterJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Created company (with admin_user when available)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Company"
                  - type: object
                    properties:
                      admin_user:
                        type: object
                        nullable: true
                        properties:
                          name:
                            type: string
                            nullable: true
                          email:
                            type: string
                            format: email
                            nullable: true
        "403":
          $ref: "#/components/responses/Forbidden403"

  /super-admin/companies/{id}:
    put:
      tags: [SuperAdmin]
      summary: Super Admin update company status/active fields
      operationId: superAdminUpdateCompany
      security:
        - RecruiterJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "200":
          description: Updated company (with admin_user when available)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Company"
                  - type: object
                    properties:
                      admin_user:
                        type: object
                        nullable: true
                        properties:
                          name:
                            type: string
                            nullable: true
                          email:
                            type: string
                            format: email
                            nullable: true
        "403":
          $ref: "#/components/responses/Forbidden403"

  /super-admin/users:
    get:
      tags: [SuperAdmin]
      summary: Super Admin list all users
      operationId: superAdminListUsers
      security:
        - RecruiterJWT: []
      responses:
        "200":
          description: Users array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                      nullable: true
                    company_id:
                      type: integer
                      format: int64
                      nullable: true
                    company_name:
                      type: string
                      nullable: true
                    roles:
                      $ref: "#/components/schemas/RolesArray"

  /super-admin/analytics/summary:
    get:
      tags: [SuperAdmin]
      summary: Super Admin analytics summary (system-wide counts)
      operationId: superAdminAnalyticsSummary
      security:
        - RecruiterJWT: []
      responses:
        "200":
          description: System-wide analytics counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_companies:
                    type: integer
                  active_companies:
                    type: integer
                  total_users:
                    type: integer
                  total_jobs:
                    type: integer
                  total_candidates:
                    type: integer
                  total_applications:
                    type: integer
                  total_interviews:
                    type: integer

  /up:
    get:
      tags: [Auth]
      summary: Health check
      operationId: railsHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
