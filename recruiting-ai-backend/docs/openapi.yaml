openapi: 3.0.3
info:
  title: Recruiting-AI Backend API
  version: "1.0.0"
  description: >
    OpenAPI (Swagger) documentation for the current `recruiting-ai-backend` Rails API.
    Recruiter/internal users authenticate with a JWT in the `Authorization` header.
    Candidate job board + candidate application endpoints use a candidate JWT in the same header.

servers:
  - url: http://localhost:3000

tags:
  - name: Auth
  - name: Company
  - name: Jobs
  - name: Candidates
  - name: Applications
  - name: Interviews
  - name: Feedback
  - name: Dashboard
  - name: CandidatePublic
  - name: Candidate
  - name: SuperAdmin

components:
  securitySchemes:
    RecruiterJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Recruiter/internal JWT token (Authorization: Bearer <token>)"
    CandidateJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Candidate JWT token (Authorization: Bearer <token>)"
    XCompanyID:
      type: apiKey
      in: header
      name: X-Company-ID
      description: Active tenant/company context for multi-company admin users.

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true

    RolesArray:
      type: array
      items:
        type: string

    UserAuthPayload:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        company_id:
          type: integer
          format: int64
          nullable: true
        active_company_id:
          type: integer
          format: int64
          nullable: true
        roles:
          $ref: "#/components/schemas/RolesArray"
        company_status:
          type: string
          nullable: true
      additionalProperties: true

    ProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        company_id:
          type: integer
          format: int64
          nullable: true
        company_name:
          type: string
          nullable: true
        roles:
          $ref: "#/components/schemas/RolesArray"
      additionalProperties: true

    SignupRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
            password:
              type: string
            password_confirmation:
              type: string
            company_name:
              type: string
              nullable: true
            domain:
              type: string
              nullable: true
            company_size:
              type: string
              nullable: true
            industry:
              type: string
              nullable: true
            address_line1:
              type: string
              nullable: true
            address_line2:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            state:
              type: string
              nullable: true
            country:
              type: string
              nullable: true
            postal_code:
              type: string
              nullable: true
            contact_email:
              type: string
              format: email
              nullable: true
            contact_phone:
              type: string
              nullable: true
          required:
            - email
            - password
            - password_confirmation
      required: [user]

    LoginRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            password:
              type: string
          required: [email, password]
      required: [user]

    PatchProfileRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
              nullable: true
            current_password:
              type: string
              nullable: true
            password:
              type: string
              nullable: true
            password_confirmation:
              type: string
              nullable: true
      required: [user]

    Company:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        domain:
          type: string
          nullable: true
        active:
          type: boolean
        status:
          type: string
          nullable: true
        company_size:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        address_line1:
          type: string
          nullable: true
        address_line2:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        contact_email:
          type: string
          format: email
          nullable: true
        contact_phone:
          type: string
          nullable: true
        admin_user_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    CompanyStatusResponse:
      type: object
      properties:
        company:
          $ref: "#/components/schemas/Company"
        admin_user:
          type: object
          nullable: true
          properties:
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
              nullable: true
      additionalProperties: true

    CreateCompanyRequest:
      type: object
      properties:
        company:
          type: object
          properties:
            company_name:
              type: string
              nullable: true
            name:
              type: string
              nullable: true
            domain:
              type: string
              nullable: true
            company_size:
              type: string
              nullable: true
            industry:
              type: string
              nullable: true
            address_line1:
              type: string
              nullable: true
            address_line2:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            state:
              type: string
              nullable: true
            country:
              type: string
              nullable: true
            postal_code:
              type: string
              nullable: true
            contact_email:
              type: string
              format: email
              nullable: true
            contact_phone:
              type: string
              nullable: true
            active:
              type: boolean
              nullable: true
            status:
              type: string
              nullable: true
          additionalProperties: true
      required: [company]

    CompanyUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        company_id:
          type: integer
          format: int64
          nullable: true
        roles:
          $ref: "#/components/schemas/RolesArray"
      additionalProperties: true

    CreateCompanyUserRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            password:
              type: string
            password_confirmation:
              type: string
          required: [email, password, password_confirmation]
        role:
          type: string
          nullable: true
          description: Role name (Admin, Recruiter, Hiring Manager, Interviewer)
      required: [user]

    Job:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        company_id:
          type: integer
          format: int64
        created_by_id:
          type: integer
          format: int64
          nullable: true
        experience_level:
          type: string
          nullable: true
        required_skills:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    JobSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        department:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        experience_level:
          type: string
          nullable: true
        required_skills:
          type: array
          items:
            type: string
        company:
          $ref: "#/components/schemas/CompanyRef"
      additionalProperties: true

    CompanyRef:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        domain:
          type: string
      additionalProperties: true

    CreateJobRequest:
      type: object
      properties:
        job:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            status:
              type: string
              nullable: true
            department:
              type: string
              nullable: true
            location:
              type: string
              nullable: true
            experience_level:
              type: string
              nullable: true
            required_skills:
              type: array
              items:
                type: string
      required: [job]

    Candidate:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        resume_url:
          type: string
          format: uri
          nullable: true
        linkedin_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          nullable: true
        company_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        resume_text:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        ai_match_score:
          type: number
          format: decimal
          nullable: true
        password_digest:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
      additionalProperties: true

    CandidateAuthPayload:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
      additionalProperties: true

    CandidateAuthRequest:
      type: object
      properties:
        candidate:
          type: object
          properties:
            name:
              type: string
              nullable: true
            email:
              type: string
              format: email
            phone:
              type: string
              nullable: true
            password:
              type: string
            password_confirmation:
              type: string
            location:
              type: string
              nullable: true
            skills:
              type: array
              items:
                type: string
          required: [email, password, password_confirmation]
      required: [candidate]

    CreateCandidateRequest:
      type: object
      properties:
        candidate:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
              nullable: true
            resume_url:
              type: string
              format: uri
              nullable: true
            linkedin_url:
              type: string
              format: uri
              nullable: true
            status:
              type: string
              nullable: true
      required: [candidate]

    ParseResumeRequest:
      type: object
      properties:
        resume_text:
          type: string
          nullable: true
      required: []

    Application:
      type: object
      properties:
        id:
          type: integer
          format: int64
        job_id:
          type: integer
          format: int64
        candidate_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          nullable: true
        applied_at:
          type: string
          format: date-time
          nullable: true
        resume_url:
          type: string
          nullable: true
        cover_note:
          type: string
          nullable: true
        ai_score:
          type: number
          format: decimal
          nullable: true
        parsed_skills:
          type: array
          items:
            type: string
      additionalProperties: true

    CreateApplicationRequest:
      type: object
      properties:
        application:
          type: object
          properties:
            job_id:
              type: integer
              format: int64
            candidate_id:
              type: integer
              format: int64
            status:
              type: string
              nullable: true
            applied_at:
              type: string
              format: date-time
              nullable: true
            resume_url:
              type: string
              nullable: true
            cover_note:
              type: string
              nullable: true
            ai_score:
              type: number
              format: decimal
              nullable: true
            parsed_skills:
              type: array
              items:
                type: string
      required: [application]

    CreateCandidateApplicationRequest:
      type: object
      properties:
        application:
          type: object
          properties:
            job_id:
              type: integer
              format: int64
            resume_url:
              type: string
              nullable: true
            cover_note:
              type: string
              nullable: true
          required: [job_id]
      required: [application]

    Interview:
      type: object
      properties:
        id:
          type: integer
          format: int64
        application_id:
          type: integer
          format: int64
        round_type:
          type: string
          nullable: true
        interviewer_id:
          type: integer
          format: int64
          nullable: true
        scheduled_at:
          type: string
          format: date-time
        status:
          type: string
          nullable: true
        meeting_link:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    CreateInterviewRequest:
      type: object
      properties:
        interview:
          type: object
          properties:
            application_id:
              type: integer
              format: int64
            round_type:
              type: string
              nullable: true
            interviewer_id:
              type: integer
              format: int64
              nullable: true
            scheduled_at:
              type: string
              format: date-time
            status:
              type: string
              nullable: true
      required: [interview]

    Feedback:
      type: object
      properties:
        id:
          type: integer
          format: int64
        interview_id:
          type: integer
          format: int64
        rating:
          type: integer
          format: int32
        strengths:
          type: string
          nullable: true
        weaknesses:
          type: string
          nullable: true
        recommendation:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true

    CreateFeedbackRequest:
      type: object
      properties:
        feedback:
          type: object
          properties:
            interview_id:
              type: integer
              format: int64
            rating:
              type: integer
              format: int32
            strengths:
              type: string
              nullable: true
            weaknesses:
              type: string
              nullable: true
            recommendation:
              type: string
      required: [feedback]

    DashboardSummary:
      type: object
      properties:
        total_jobs:
          type: integer
        active_jobs:
          type: integer
        total_candidates:
          type: integer
        total_applications:
          type: integer

    DashboardPipeline:
      type: object
      properties:
        pipeline:
          type: object
          additionalProperties:
            type: integer

    DashboardReports:
      type: object
      properties:
        total_interviews:
          type: integer
        completed_interviews:
          type: integer
        interview_conversion_rate:
          type: number
          format: decimal
        hired_count:
          type: integer
        hiring_rate:
          type: number
          format: decimal

    CandidateApplication:
      type: object
      properties:
        id:
          type: integer
          format: int64
        job_id:
          type: integer
          format: int64
        job_title:
          type: string
        company_name:
          type: string
          nullable: true
        company_id:
          type: integer
          format: int64
          nullable: true
        applied_at:
          type: string
          format: date-time
        status:
          type: string
          nullable: true
        resume_url:
          type: string
          nullable: true
        cover_note:
          type: string
          nullable: true
        ai_score:
          type: number
          format: decimal
          nullable: true
        interview:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              format: int64
            round_type:
              type: string
              nullable: true
            scheduled_at:
              type: string
              format: date-time
            meeting_link:
              type: string
              nullable: true
            interviewer:
              type: object
              nullable: true
              properties:
                id:
                  type: integer
                  format: int64
                name:
                  type: string
                  nullable: true
                email:
                  type: string
                  format: email
                  nullable: true
      additionalProperties: true

  responses:
    Unauthorized401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  parameters:
    XCompanyIDHeader:
      name: X-Company-ID
      in: header
      required: false
      schema:
        type: string
      description: Active company id for multi-company admins.

paths:
  /signup:
    post:
      tags: [Auth]
      summary: Recruiter/internal signup
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created (pending company approval)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserAuthPayload"
                  token:
                    type: string
                  pending:
                    type: boolean
                  message:
                    type: string
                required: [user, token, pending, message]
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /login:
    post:
      tags: [Auth]
      summary: Recruiter/internal login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserAuthPayload"
                  token:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"

  /profile:
    get:
      tags: [Auth]
      summary: Current recruiter/internal profile
      operationId: getProfile
      security:
        - RecruiterJWT: []
          XCompanyID: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIDHeader"
      responses:
        "200":
          description: Profile JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
    patch:
      tags: [Auth]
      summary: Update profile (name/email, and optionally password)
      operationId: patchProfile
      security:
        - RecruiterJWT: []
          XCompanyID: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIDHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /company/status:
    get:
      tags: [Company]
      summary: Active company details for pending/rejected UI
      operationId: getCompanyStatus
      security:
        - RecruiterJWT: []
          XCompanyID: []
      parameters:
        - $ref: "#/components/parameters/XCompanyIDHeader"
      responses:
        "200":
          description: Current tenant and admin identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"

  /companies:
    get:
      tags: [Company]
      summary: List companies (owned by active admin; Super Admin sees all)
      operationId: listCompanies
      security:
        - RecruiterJWT: []
      responses:
        "200":
          description: Company array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
    post:
      tags: [Company]
      summary: Create a new company tenant (created in pending status)
      operationId: createCompany
      security:
        - RecruiterJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Company created (pending approval)
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    $ref: "#/components/schemas/Company"
                  user:
                    $ref: "#/components/schemas/UserAuthPayload"
                  pending:
                    type: boolean
                  message:
                    type: string
                required: [company, user, pending, message]
        "403":
          $ref: "#/components/responses/Forbidden403"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}:
    get:
      tags: [Company]
      summary: Get company by id
      operationId: getCompany
      security:
        - RecruiterJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "404":
          $ref: "#/components/responses/NotFound404"
    put:
      tags: [Company]
      summary: Update company (Super Admin can toggle active/status)
      operationId: updateCompany
      security:
        - RecruiterJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "403":
          $ref: "#/components/responses/Forbidden403"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
